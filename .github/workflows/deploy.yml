name: deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  CLOUDFLARE_ACCOUNT_ID: e1fe0f0ce8ff18da4edc118372c30022
  # Opt every javascript-based action into Node 24 ahead of the
  # 2026-06-02 deprecation of Node 20 on GitHub Actions runners.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate library
        run: pnpm validate

      - name: Build converter outputs
        run: pnpm build

      - name: Build Astro site
        run: cd web && pnpm build

      - name: Create temporary deploy token
        id: cf_token
        env:
          CLOUDFLARE_MGMT_TOKEN: ${{ secrets.CLOUDFLARE_MGMT_TOKEN }}
        run: |
          EXPIRY=$(date -u -d "+8 hours" +"%Y-%m-%dT%H:%M:%SZ")
          PAYLOAD=$(jq -n --arg name "deploy-$(date +%s)" --arg expires "$EXPIRY" '{name: $name, expires_on: $expires, policies: [{effect: "allow", resources: {"com.cloudflare.api.account.e1fe0f0ce8ff18da4edc118372c30022": "*"}, permission_groups: [{id: "8d28297797f24fb8a0c332fe0866ec89", name: "Pages Write"},{id: "e247aedd66bd41cc9193af0213416666", name: "Pages Read"}]}]}')
          RESPONSE=$(curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/e1fe0f0ce8ff18da4edc118372c30022/tokens" -H "Authorization: Bearer $CLOUDFLARE_MGMT_TOKEN" -H "Content-Type: application/json" -d "$PAYLOAD")
          TOKEN_ID=$(echo "$RESPONSE" | jq -r '.result.id // empty')
          TOKEN_VAL=$(echo "$RESPONSE" | jq -r '.result.value // empty')
          [ -z "$TOKEN_VAL" ] && echo "Failed: $(echo "$RESPONSE" | jq '.errors')" && exit 1
          echo "::add-mask::$TOKEN_VAL"
          echo "token_id=$TOKEN_ID" >> "$GITHUB_OUTPUT"
          echo "token_val=$TOKEN_VAL" >> "$GITHUB_OUTPUT"

      # wrangler-action@v3 tries `pnpm add wrangler` at the workspace root,
      # which pnpm rejects without -w. wrangler is already a devDep in web/,
      # so we exec it directly via pnpm from there.
      - name: Deploy to Cloudflare Pages
        working-directory: ./web
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.cf_token.outputs.token_val }}
        run: pnpm exec wrangler pages deploy dist --project-name brand-atoms --branch main

      - name: Revoke temporary deploy token
        if: always()
        env:
          CLOUDFLARE_MGMT_TOKEN: ${{ secrets.CLOUDFLARE_MGMT_TOKEN }}
        run: |
          TOKEN_ID="${{ steps.cf_token.outputs.token_id }}"
          [ -z "$TOKEN_ID" ] && exit 0
          curl -s -X DELETE "https://api.cloudflare.com/client/v4/accounts/e1fe0f0ce8ff18da4edc118372c30022/tokens/$TOKEN_ID" -H "Authorization: Bearer $CLOUDFLARE_MGMT_TOKEN"
