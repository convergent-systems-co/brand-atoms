kind: font
id: heavy-data-nerdfont
version: 1.0.0
name: HeavyData Nerd Font
description: >
  HeavyData monospaced font with Nerd Fonts glyph augmentation. A heavy, geometric display-style monospace by Vic Fieger — best suited to large terminal/display use rather than long-form code; patched with ~10,000 additional icons (Powerline, Material Design Icons, Font Awesome, Devicons, Octicons, Codicons, etc.).
family: HeavyData Nerd Font
classification: monospace
tags: [ nerd-font, monospace, display, heavy, terminal ]

provenance:
  source: https://github.com/ryanoasis/nerd-fonts/releases/tag/v3.4.0
  license: LicenseRef-VicFiegerFreeware
  attribution: >
    HeavyData, Copyright Vic Fieger (vic@vicfieger.com), distributed as freeware ("free for any use; no permission required") per the Vic Fieger Fonts License. Nerd Fonts patching by Ryan L McIntyre, MIT license.
  importedDate: 2026-05-19
  importedFromVersion: v3.4.0
  notes: >
    Base font: HeavyData by Vic Fieger. No SPDX identifier exists for the Vic Fieger Fonts License; recorded as LicenseRef-VicFiegerFreeware. Effective terms: free download and use, no permission request required, optional notification to the author. Download archive: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/HeavyData.zip

source:
  kind: external
  family: HeavyData Nerd Font
  notes: >
    Nerd-Font-patched build of HeavyData. Single-weight (Regular only). The patched release does not include a Mono-spaced variant — only the regular and proportional (Propo) builds; this atom references the regular build, which is fixed-pitch in HeavyData's own metrics. Download ttf files from the Nerd Fonts GitHub release and self-host, or install system-wide for display/terminal use.

fallbackStack:
  - HeavyData
  - Menlo
  - Monaco
  - Consolas
  - Liberation Mono
  - monospace

availableStyles:
  - { weight: 400, style: normal }
cdnUrls:
  HeavyDataNerdFont-Regular.ttf: https://cdn.brand-atoms.com/fonts/heavy-data-nerdfont/1.0.0/HeavyDataNerdFont-Regular.ttf
