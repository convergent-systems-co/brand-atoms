kind: font
id: commit-mono-nerdfont
version: 1.0.0
name: CommitMono Nerd Font
description: >
  Commit Mono with Nerd Fonts glyph augmentation. Commit Mono is Eigil Nikolajsen's "anonymous and neutral" programming typeface, engineered for a calm reading experience in dense source code. Patched with ~10,000 additional icons (Powerline, Material Design Icons, Font Awesome, Devicons, Octicons, Codicons, etc.).
family: CommitMono Nerd Font
classification: monospace
tags: [ nerd-font, monospace, programming, terminal, code ]

provenance:
  source: https://github.com/ryanoasis/nerd-fonts/releases/tag/v3.4.0
  license: OFL-1.1
  attribution: >
    Commit Mono, by Eigil Nikolajsen (https://github.com/eigilnikolajsen/commit-mono). Licensed under the SIL Open Font License, Version 1.1. Nerd Fonts patching by Ryan L McIntyre, MIT license.
  importedDate: 2026-05-19
  importedFromVersion: v3.4.0
  notes: >
    Base font version: Commit Mono 1.143. Binaries ship as OpenType (.otf). Download archive: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/CommitMono.zip

source:
  kind: external
  family: CommitMono Nerd Font
  notes: >
    Nerd-Font-patched build of Commit Mono. Binaries are .otf. Not available via Google Fonts. Download from the Nerd Fonts GitHub release and self-host, or install system-wide for terminal/editor use.

fallbackStack:
  - Commit Mono
  - JetBrains Mono
  - Menlo
  - Monaco
  - Consolas
  - Liberation Mono
  - monospace

availableStyles:
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 700, style: normal }
  - { weight: 700, style: italic }
cdnUrls:
  CommitMonoNerdFontMono-Regular.otf: https://cdn.brand-atoms.com/fonts/commit-mono-nerdfont/1.0.0/CommitMonoNerdFontMono-Regular.otf
  CommitMonoNerdFontMono-Italic.otf: https://cdn.brand-atoms.com/fonts/commit-mono-nerdfont/1.0.0/CommitMonoNerdFontMono-Italic.otf
  CommitMonoNerdFontMono-Bold.otf: https://cdn.brand-atoms.com/fonts/commit-mono-nerdfont/1.0.0/CommitMonoNerdFontMono-Bold.otf
  CommitMonoNerdFontMono-BoldItalic.otf: https://cdn.brand-atoms.com/fonts/commit-mono-nerdfont/1.0.0/CommitMonoNerdFontMono-BoldItalic.otf
