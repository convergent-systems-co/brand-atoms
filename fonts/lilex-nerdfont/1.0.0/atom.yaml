  LilexNerdFontMono-Regular.ttf: https://cdn.brand-atoms.com/fonts/lilex-nerdfont/1.0.0/LilexNerdFontMono-Regular.ttf
  LilexNerdFontMono-Italic.ttf: https://cdn.brand-atoms.com/fonts/lilex-nerdfont/1.0.0/LilexNerdFontMono-Italic.ttf
