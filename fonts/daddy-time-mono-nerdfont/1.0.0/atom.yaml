kind: font
id: daddy-time-mono-nerdfont
version: 1.0.0
name: Daddy Time Mono Nerd Font
description: >
  Daddy Time Mono monospaced font with Nerd Fonts glyph augmentation. A casual handwritten-style coding font designed by Helena Zhang; patched with ~10,000 additional icons (Powerline, Material Design Icons, Font Awesome, Devicons, Octicons, Codicons, etc.).
family: DaddyTimeMono Nerd Font
classification: monospace
tags: [ nerd-font, monospace, handwritten, terminal, code ]

