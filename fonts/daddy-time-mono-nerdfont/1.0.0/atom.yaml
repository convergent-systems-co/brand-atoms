  license: OFL-1.1
  attribution: >
    Daddy Time Mono, Copyright 2022–2024 Helena Zhang (helenazhang.com), licensed under the SIL Open Font License, Version 1.1. Nerd Fonts patching by Ryan L McIntyre, MIT license.
  importedDate: 2026-05-19
  importedFromVersion: v3.4.0
  notes: >
    Upstream: https://github.com/HelenaZhang/daddytimemono. Download archive: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/DaddyTimeMono.zip

source:
  kind: external
  family: DaddyTimeMono Nerd Font
  notes: >
    Nerd-Font-patched build of Daddy Time Mono. Single-weight (Regular only). Download ttf files from the Nerd Fonts GitHub release and self-host, or install system-wide for terminal/editor use.

