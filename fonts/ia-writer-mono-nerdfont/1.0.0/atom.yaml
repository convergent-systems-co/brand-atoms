kind: font
id: ia-writer-mono-nerdfont
version: 1.0.0
name: iA Writer Mono Nerd Font
description: >
  iA Writer Mono monospaced font with Nerd Fonts glyph augmentation. iA's writing-focused monospace, derived from IBM Plex Mono and tuned for prose and code; patched with ~10,000 additional icons (Powerline, Material Design Icons, Font Awesome, Devicons, Octicons, Codicons, etc.).
family: iMWriting Mono Nerd Font
classification: monospace
tags: [ nerd-font, monospace, ibm-plex, writing, terminal ]

provenance:
  source: https://github.com/ryanoasis/nerd-fonts/releases/tag/v3.4.0
  license: OFL-1.1
  attribution: >
    iA Writer Typeface, Copyright 2018 Information Architects Inc. with Reserved Font Name "iA Writer", licensed under the SIL Open Font License, Version 1.1. Based on IBM Plex, Copyright 2017 IBM Corp. with Reserved Font Name "Plex". Nerd Fonts patching by Ryan L McIntyre, MIT license. Note: Nerd-Font-patched build is distributed under the family name "iMWriting" to comply with the OFL Reserved Font Name clause.
  importedDate: 2026-05-19
  importedFromVersion: v3.4.0
  notes: >
    Base font version: iA Writer 2.000 (Dec 2018). Upstream source: https://github.com/iaolo/iA-Fonts. Download archive: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/iA-Writer.zip

source:
  kind: external
  family: iMWriting Mono Nerd Font
  notes: >
    Nerd-Font-patched build of iA Writer Mono (renamed "iMWriting Mono" for distribution per OFL Reserved Font Name). Not available via Google Fonts. Download woff2/ttf files from the Nerd Fonts GitHub release and self-host, or install system-wide for terminal/editor use.

fallbackStack:
  - iA Writer Mono
  - IBM Plex Mono
  - Menlo
  - Monaco
  - Consolas
  - Liberation Mono
  - monospace

availableStyles:
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 700, style: normal }
  - { weight: 700, style: italic }
cdnUrls:
  iMWritingMonoNerdFontMono-Regular.ttf: https://cdn.brand-atoms.com/fonts/ia-writer-mono-nerdfont/1.0.0/iMWritingMonoNerdFontMono-Regular.ttf
  iMWritingMonoNerdFontMono-Italic.ttf: https://cdn.brand-atoms.com/fonts/ia-writer-mono-nerdfont/1.0.0/iMWritingMonoNerdFontMono-Italic.ttf
  iMWritingMonoNerdFontMono-Bold.ttf: https://cdn.brand-atoms.com/fonts/ia-writer-mono-nerdfont/1.0.0/iMWritingMonoNerdFontMono-Bold.ttf
  iMWritingMonoNerdFontMono-BoldItalic.ttf: https://cdn.brand-atoms.com/fonts/ia-writer-mono-nerdfont/1.0.0/iMWritingMonoNerdFontMono-BoldItalic.ttf
