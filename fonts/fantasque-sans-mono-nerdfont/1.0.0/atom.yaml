kind: font
id: fantasque-sans-mono-nerdfont
version: 1.0.0
name: Fantasque Sans Mono Nerd Font
description: >
  Fantasque Sans Mono monospaced font with Nerd Fonts glyph augmentation. A playful, slightly italicized programming font by Jany Belluz inspired by Inconsolata and Monaco; patched with ~10,000 additional icons (Powerline, Material Design Icons, Font Awesome, Devicons, Octicons, Codicons, etc.).
family: FantasqueSansM Nerd Font
classification: monospace
tags: [ nerd-font, monospace, playful, italic-like, terminal, code ]

provenance:
  source: https://github.com/ryanoasis/nerd-fonts/releases/tag/v3.4.0
  license: OFL-1.1
  attribution: >
    Fantasque Sans Mono, Copyright Jany Belluz (https://github.com/belluzj/fantasque-sans), licensed under the SIL Open Font License, Version 1.1. Nerd Fonts patching by Ryan L McIntyre, MIT license.
  importedDate: 2026-05-19
  importedFromVersion: v3.4.0
  notes: >
    Base font: Fantasque Sans Mono 1.8.0. Upstream: https://github.com/belluzj/fantasque-sans. Download archive: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/FantasqueSansMono.zip

source:
  kind: external
  family: FantasqueSansM Nerd Font
  notes: >
    Nerd-Font-patched build of Fantasque Sans Mono. Distributed under the family name "FantasqueSansM Nerd Font" (M = "Mono"). Not available via Google Fonts. Download ttf files from the Nerd Fonts GitHub release and self-host, or install system-wide for terminal/editor use.

fallbackStack:
  - Fantasque Sans Mono
  - Inconsolata
  - Menlo
  - Monaco
  - Consolas
  - Liberation Mono
  - monospace

availableStyles:
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 700, style: normal }
  - { weight: 700, style: italic }
cdnUrls:
  FantasqueSansMNerdFontMono-Regular.ttf: https://cdn.brand-atoms.com/fonts/fantasque-sans-mono-nerdfont/1.0.0/FantasqueSansMNerdFontMono-Regular.ttf
  FantasqueSansMNerdFontMono-Italic.ttf: https://cdn.brand-atoms.com/fonts/fantasque-sans-mono-nerdfont/1.0.0/FantasqueSansMNerdFontMono-Italic.ttf
  FantasqueSansMNerdFontMono-Bold.ttf: https://cdn.brand-atoms.com/fonts/fantasque-sans-mono-nerdfont/1.0.0/FantasqueSansMNerdFontMono-Bold.ttf
  FantasqueSansMNerdFontMono-BoldItalic.ttf: https://cdn.brand-atoms.com/fonts/fantasque-sans-mono-nerdfont/1.0.0/FantasqueSansMNerdFontMono-BoldItalic.ttf
