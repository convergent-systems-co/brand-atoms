kind: font
id: liberation-mono-nerdfont
version: 1.0.0
name: Liberation Mono Nerd Font
description: >
  Liberation Mono monospaced font with Nerd Fonts glyph augmentation. Red Hat's metric-compatible replacement for Courier New, distributed widely with Linux distributions; patched with ~10,000 additional icons (Powerline, Material Design Icons, Font Awesome, Devicons, Octicons, Codicons, etc.).
family: Literation Mono Nerd Font
classification: monospace
tags: [ nerd-font, monospace, linux, metric-compatible, code, terminal ]

provenance:
  source: https://github.com/ryanoasis/nerd-fonts/releases/tag/v3.4.0
  license: OFL-1.1
  attribution: >
    Liberation Fonts, Copyright 2007–2025 Red Hat, Inc. with Reserved Font Name "Liberation", licensed under the SIL Open Font License, Version 1.1. Nerd Fonts patching by Ryan L McIntyre, MIT license. Note: Nerd-Font-patched build is distributed under the family name "Literation Mono" to comply with the OFL Reserved Font Name clause.
  importedDate: 2026-05-19
  importedFromVersion: v3.4.0
  notes: >
    Download archive: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/LiberationMono.zip. The full Liberation family includes Mono, Sans, and Serif cuts; this atom covers only the Mono cut. Metric-compatible with Courier New (matching advance widths so substitution does not reflow text).

source:
  kind: external
  family: Literation Mono Nerd Font
  notes: >
    Nerd-Font-patched build of Liberation Mono (renamed "Literation Mono" for distribution per OFL Reserved Font Name). Not available via Google Fonts. Download woff2/ttf files from the Nerd Fonts GitHub release and self-host, or install system-wide for terminal/editor use.

fallbackStack:
  - Liberation Mono
  - Courier New
  - Menlo
  - Monaco
  - Consolas
  - monospace

availableStyles:
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 700, style: normal }
  - { weight: 700, style: italic }
cdnUrls:
  LiterationMonoNerdFontMono-Regular.ttf: https://cdn.brand-atoms.com/fonts/liberation-mono-nerdfont/1.0.0/LiterationMonoNerdFontMono-Regular.ttf
  LiterationMonoNerdFontMono-Italic.ttf: https://cdn.brand-atoms.com/fonts/liberation-mono-nerdfont/1.0.0/LiterationMonoNerdFontMono-Italic.ttf
  LiterationMonoNerdFontMono-Bold.ttf: https://cdn.brand-atoms.com/fonts/liberation-mono-nerdfont/1.0.0/LiterationMonoNerdFontMono-Bold.ttf
  LiterationMonoNerdFontMono-BoldItalic.ttf: https://cdn.brand-atoms.com/fonts/liberation-mono-nerdfont/1.0.0/LiterationMonoNerdFontMono-BoldItalic.ttf
