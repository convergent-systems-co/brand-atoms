kind: font
id: meslo-nerdfont
version: 1.0.0
name: Meslo Nerd Font
description: >
  Meslo LG monospaced font with Nerd Fonts glyph augmentation. André Berg's customizable fork of Apple's Menlo with adjustable line-gap (S/M/L) and optional zero with a slash (DZ); patched with ~10,000 additional icons (Powerline, Material Design Icons, Font Awesome, Devicons, Octicons, Codicons, etc.). Popular default for Oh My Zsh / Powerlevel10k.
family: MesloLGM Nerd Font
classification: monospace
tags: [ nerd-font, monospace, menlo, powerline, terminal, oh-my-zsh ]

provenance:
  source: https://github.com/ryanoasis/nerd-fonts/releases/tag/v3.4.0
  license: OFL-1.1
  attribution: >
    Meslo LG, Copyright André Berg (https://github.com/andreberg/Meslo-Font), based on Apple's Menlo (a derivative of Bitstream Vera Sans Mono). Meslo LG is licensed under the Apache License, Version 2.0; Nerd Fonts redistributes it under SIL OFL 1.1. Nerd Fonts patching by Ryan L McIntyre, MIT license.
  importedDate: 2026-05-19
  importedFromVersion: v3.4.0
  notes: >
    Download archive: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/Meslo.zip. Meslo ships three line-gap variants (S = small, M = medium = default, L = large) and an optional "DZ" cut with a slashed zero (so six combinations total). This atom canonicalizes on the M (medium) line-gap as the default family name "MesloLGM"; the S/L and DZ variants are also represented in cdnUrls for direct addressing.

source:
  kind: external
  family: MesloLGM Nerd Font
  notes: >
    Nerd-Font-patched build of Meslo LG. Not available via Google Fonts. Download woff2/ttf files from the Nerd Fonts GitHub release and self-host, or install system-wide for terminal use. Six family variants ship — MesloLGS, MesloLGM, MesloLGL (small/medium/large line-gap) and their DZ (slashed-zero) twins. Pick the variant by filename; each is its own CSS font-family.

fallbackStack:
  - Meslo LG M
  - Menlo
  - Monaco
  - Consolas
  - Liberation Mono
  - monospace

availableStyles:
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 700, style: normal }
  - { weight: 700, style: italic }
