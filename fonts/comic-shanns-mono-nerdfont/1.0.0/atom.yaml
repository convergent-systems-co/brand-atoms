kind: font
id: comic-shanns-mono-nerdfont
version: 1.0.0
name: ComicShannsMono Nerd Font
description: >
  Comic Shanns Mono with Nerd Fonts glyph augmentation. Comic Shanns Mono is a monospaced "programming Comic Sans" — Shannon Miwa's playful but legible code-tuned face, later maintained by Jesus Gonzalez. Patched with ~10,000 additional icons (Powerline, Material Design Icons, Font Awesome, Devicons, Octicons, Codicons, etc.).
family: ComicShannsMono Nerd Font
classification: monospace
tags: [ nerd-font, monospace, programming, playful, terminal, code ]

provenance:
  source: https://github.com/ryanoasis/nerd-fonts/releases/tag/v3.4.0
  license: MIT
  attribution: >
    Comic Shanns Mono, Copyright (c) 2018 Shannon Miwa and Copyright (c) 2023 Jesus Gonzalez. Licensed under the MIT License. Nerd Fonts patching by Ryan L McIntyre, MIT license.
  importedDate: 2026-05-19
  importedFromVersion: v3.4.0
  notes: >
    Base font version: Comic Shanns Mono 1.3.1. Binaries ship as OpenType (.otf). Download archive: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/ComicShannsMono.zip

source:
  kind: external
  family: ComicShannsMono Nerd Font
  notes: >
    Nerd-Font-patched build of Comic Shanns Mono. Binaries are .otf. Not available via Google Fonts. Download from the Nerd Fonts GitHub release and self-host, or install system-wide for terminal/editor use.

fallbackStack:
  - Comic Shanns Mono
  - Comic Mono
  - Menlo
  - Monaco
  - Consolas
  - Liberation Mono
  - monospace

availableStyles:
  - { weight: 400, style: normal }
  - { weight: 700, style: normal }
cdnUrls:
  ComicShannsMonoNerdFontMono-Regular.otf: https://cdn.brand-atoms.com/fonts/comic-shanns-mono-nerdfont/1.0.0/ComicShannsMonoNerdFontMono-Regular.otf
  ComicShannsMonoNerdFontMono-Bold.otf: https://cdn.brand-atoms.com/fonts/comic-shanns-mono-nerdfont/1.0.0/ComicShannsMonoNerdFontMono-Bold.otf
