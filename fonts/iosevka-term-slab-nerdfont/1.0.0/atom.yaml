kind: font
id: iosevka-term-slab-nerdfont
version: 1.0.0
name: Iosevka Term Slab Nerd Font
description: >
  Iosevka Term Slab monospaced font with Nerd Fonts glyph augmentation. Slab-serif cut of Iosevka's terminal-tuned variant, combining the narrow 1:2 aspect ratio with bracketed slab serifs for code display; patched with ~10,000 additional icons (Powerline, Material Design Icons, Font Awesome, Devicons, Octicons, Codicons, etc.).
family: Iosevka Term Slab Nerd Font
classification: monospace
tags: [ nerd-font, monospace, slab-serif, narrow, terminal, code ]

provenance:
  source: https://github.com/ryanoasis/nerd-fonts/releases/tag/v3.4.0
  license: OFL-1.1
  attribution: >
    Iosevka Term Slab, Copyright Belleve Invis (https://github.com/be5invis/Iosevka), licensed under the SIL Open Font License, Version 1.1. Nerd Fonts patching by Ryan L McIntyre, MIT license.
  importedDate: 2026-05-19
  importedFromVersion: v3.4.0
  notes: >
    Base font version: Iosevka 33.2.1. Download archive: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/IosevkaTermSlab.zip. Slab-serif cut — for the sans-serif terminal cut see iosevka-term-nerdfont. Nerd Fonts ships a narrower weight range here than the sans cut (Light through ExtraBold, no Thin, ExtraLight, SemiBold, or Heavy).

source:
  kind: external
  family: Iosevka Term Slab Nerd Font
  notes: >
    Nerd-Font-patched build of Iosevka Term Slab. Not available via Google Fonts. Download woff2/ttf files from the Nerd Fonts GitHub release and self-host, or install system-wide for terminal/editor use.

fallbackStack:
  - Iosevka Term Slab
  - Iosevka
  - JetBrains Mono
  - Menlo
  - Monaco
  - Consolas
  - Liberation Mono
  - monospace

availableStyles:
  - { weight: 300, style: normal }
  - { weight: 300, style: italic }
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 500, style: normal }
  - { weight: 500, style: italic }
  - { weight: 700, style: normal }
  - { weight: 700, style: italic }
  - { weight: 800, style: normal }
  - { weight: 800, style: italic }
