kind: font
id: d2coding-nerdfont
version: 1.0.0
name: D2Coding Nerd Font
description: >
  D2Coding monospaced font with Nerd Fonts glyph augmentation. Open-source coding font by NAVER Corp. with strong Korean (Hangul) support and programming ligatures; patched with ~10,000 additional icons (Powerline, Material Design Icons, Font Awesome, Devicons, Octicons, Codicons, etc.).
family: D2CodingLigature Nerd Font
classification: monospace
tags: [ nerd-font, monospace, korean, hangul, ligatures, naver, terminal, code ]

provenance:
  source: https://github.com/ryanoasis/nerd-fonts/releases/tag/v3.4.0
  license: OFL-1.1
  attribution: >
    D2Coding, Copyright 2015–2016 NHN Corporation (NAVER), licensed under the SIL Open Font License, Version 1.1. Nerd Fonts patching by Ryan L McIntyre, MIT license.
  importedDate: 2026-05-19
  importedFromVersion: v3.4.0
  notes: >
    Base font version: D2Coding 1.3.2 (Ligature build). Upstream: https://github.com/naver/d2codingfont. Download archive: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/D2Coding.zip

source:
  kind: external
  family: D2CodingLigature Nerd Font
  notes: >
    Nerd-Font-patched build of D2Coding (Ligature variant). Not available via Google Fonts. Download ttf files from the Nerd Fonts GitHub release and self-host, or install system-wide for terminal/IDE use. Particularly suited to mixed Latin/Korean source code.

fallbackStack:
  - D2Coding
  - Noto Sans Mono CJK KR
  - Menlo
  - Monaco
  - Consolas
  - Liberation Mono
  - monospace

availableStyles:
  - { weight: 400, style: normal }
  - { weight: 700, style: normal }
cdnUrls:
  D2CodingLigatureNerdFontMono-Regular.ttf: https://cdn.brand-atoms.com/fonts/d2coding-nerdfont/1.0.0/D2CodingLigatureNerdFontMono-Regular.ttf
  D2CodingLigatureNerdFontMono-Bold.ttf: https://cdn.brand-atoms.com/fonts/d2coding-nerdfont/1.0.0/D2CodingLigatureNerdFontMono-Bold.ttf
