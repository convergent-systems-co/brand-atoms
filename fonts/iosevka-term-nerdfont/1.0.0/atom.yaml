kind: font
id: iosevka-term-nerdfont
version: 1.0.0
name: Iosevka Term Nerd Font
description: >
  Iosevka Term monospaced font with Nerd Fonts glyph augmentation. Terminal-tuned cut of Iosevka with ligatures disabled and ambiguous shapes (l vs I vs 1, O vs 0) emphasized for code display; patched with ~10,000 additional icons (Powerline, Material Design Icons, Font Awesome, Devicons, Octicons, Codicons, etc.).
family: Iosevka Term Nerd Font
classification: monospace
tags: [ nerd-font, monospace, narrow, terminal, code ]

provenance:
  source: https://github.com/ryanoasis/nerd-fonts/releases/tag/v3.4.0
  license: OFL-1.1
  attribution: >
    Iosevka Term, Copyright Belleve Invis (https://github.com/be5invis/Iosevka), licensed under the SIL Open Font License, Version 1.1. Nerd Fonts patching by Ryan L McIntyre, MIT license.
  importedDate: 2026-05-19
  importedFromVersion: v3.4.0
  notes: >
    Base font version: Iosevka 33.2.1. Download archive: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/IosevkaTerm.zip. Terminal-tuned variant — for the default cut see iosevka-nerdfont; for slab serifs see iosevka-term-slab-nerdfont.

source:
  kind: external
  family: Iosevka Term Nerd Font
  notes: >
    Nerd-Font-patched build of Iosevka Term. Not available via Google Fonts. Download woff2/ttf files from the Nerd Fonts GitHub release and self-host, or install system-wide for terminal/editor use. Ships nine weights (Thin through Heavy) with italic and oblique cuts of each.

fallbackStack:
  - Iosevka Term
  - Iosevka
  - JetBrains Mono
  - Menlo
  - Monaco
  - Consolas
  - Liberation Mono
  - monospace

