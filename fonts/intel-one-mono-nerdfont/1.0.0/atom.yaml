kind: font
id: intel-one-mono-nerdfont
version: 1.0.0
name: Intel One Mono Nerd Font
description: >
  Intel One Mono monospaced font with Nerd Fonts glyph augmentation. Intel's open-source developer typeface designed in collaboration with the low-vision community for code readability; patched with ~10,000 additional icons (Powerline, Material Design Icons, Font Awesome, Devicons, Octicons, Codicons, etc.).
family: IntoneMono Nerd Font
classification: monospace
tags: [ nerd-font, monospace, intel, accessibility, code, terminal ]

provenance:
  source: https://github.com/ryanoasis/nerd-fonts/releases/tag/v3.4.0
  license: OFL-1.1
  attribution: >
    Intel One Mono, Copyright 2023 Intel Corporation with Reserved Font Name "Intel One Mono", licensed under the SIL Open Font License, Version 1.1. Designed by Frere-Jones Type. Nerd Fonts patching by Ryan L McIntyre, MIT license. Note: Nerd-Font-patched build is distributed under the family name "IntoneMono" to comply with the OFL Reserved Font Name clause.
  importedDate: 2026-05-19
  importedFromVersion: v3.4.0
  notes: >
    Upstream source: https://github.com/intel/intel-one-mono. Download archive: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/IntelOneMono.zip

source:
  kind: external
  family: IntoneMono Nerd Font
  notes: >
    Nerd-Font-patched build of Intel One Mono (renamed "IntoneMono" for distribution per OFL Reserved Font Name). Not available via Google Fonts. Download woff2/ttf files from the Nerd Fonts GitHub release and self-host, or install system-wide for terminal/editor use.

fallbackStack:
  - Intel One Mono
  - JetBrains Mono
  - Menlo
  - Monaco
  - Consolas
  - Liberation Mono
  - monospace

availableStyles:
  - { weight: 300, style: normal }
  - { weight: 300, style: italic }
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 500, style: normal }
  - { weight: 500, style: italic }
  - { weight: 700, style: normal }
  - { weight: 700, style: italic }
cdnUrls:
