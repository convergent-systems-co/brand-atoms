  IntoneMonoNerdFontMono-Regular.ttf: https://cdn.brand-atoms.com/fonts/intel-one-mono-nerdfont/1.0.0/IntoneMonoNerdFontMono-Regular.ttf
  IntoneMonoNerdFontMono-Italic.ttf: https://cdn.brand-atoms.com/fonts/intel-one-mono-nerdfont/1.0.0/IntoneMonoNerdFontMono-Italic.ttf
  IntoneMonoNerdFontMono-Medium.ttf: https://cdn.brand-atoms.com/fonts/intel-one-mono-nerdfont/1.0.0/IntoneMonoNerdFontMono-Medium.ttf
  IntoneMonoNerdFontMono-MediumItalic.ttf: https://cdn.brand-atoms.com/fonts/intel-one-mono-nerdfont/1.0.0/IntoneMonoNerdFontMono-MediumItalic.ttf
  IntoneMonoNerdFontMono-Bold.ttf: https://cdn.brand-atoms.com/fonts/intel-one-mono-nerdfont/1.0.0/IntoneMonoNerdFontMono-Bold.ttf
