id: apple-music
version: 1.0.0
name: Apple Music
description: >
  Apple Music is Apple's subscription music-streaming service, a
  product brand operated under the Apple corporate parent. Where
  the Apple corporate mark is strictly monochrome, Apple Music
  carries the warmest, most chromatic identity in Apple's
  service-tier portfolio: a signature pink-to-red gradient mark
  used across the iOS / macOS app icon, the marketing site, and
  the Apple Music wordmark lockup. The brand voice inherits Apple's
  HIG restraint — clarity, deference to content, generous
  whitespace — but is expressive and editorial in marketing: bold
  hero photography of artists, gradient typographic moments, and
  the dark canvas the app itself uses by default.

  This atom is the **product-brand** atom; the corporate Apple
  parent brand lives at `apple@1` and is documented separately.
  Apple Music inherits Apple's SF Pro typography, dark-first HIG
  surface model, and platform-wide accessibility floor — but
  overrides the corporate brand's monochrome posture with the
  pink/red gradient as its primary identity color.

tags: [apple-music, music, streaming, apple, dark-first, consumer-tech, gradient]

provenance:
  source: https://brandcolorcode.com/apple-music
  license: Proprietary — All Rights Reserved
  attribution: >
    Apple, Apple Music, the Apple Music wordmark, and the
    pink-to-red gradient mark are trademarks of Apple Inc. This
    atom captures brand-atoms' read of Apple Music's publicly
    observable identity (the marketing site at apple.com/apple-music/
    and the iOS / macOS app icon and wordmark) cross-referenced
    against third-party brand-color aggregators. It is not an
    official Apple brand-guidelines document.
  importedDate: 2026-05-19
  notes: >
    Apple Music sits **under the `apple@1` parent brand**. The
    parent atom MUST NOT be modified by this child; relationship
    is documented here in prose only. Apple does not publish
    explicit hex values for the Apple Music gradient — the
    pink (#FF4E6B) and red (#FF0436) values are the closest
    third-party-reported approximations per brandcolorcode.com.
    The proprietary SF Pro family is not openly distributed; this
    atom substitutes `inter@1` as the open-source rendering
    fallback for both heading and body roles, mirroring the
    convention used by other Apple-family atoms in this catalog.

references:
  palette: apple-music@1
  fonts:
    heading: inter@1
    body: inter@1
    mono: jetbrainsmono-nerdfont@1

roles:
  colors:
    # Apple Music is dark-first like the consumer app; the
    # identity block is the pink-to-red gradient terminus pair,
    # with the pink as the principal brand color and red as the
    # gradient deep end. `identity` here = the pink because that
    # is the brighter, more recognizable gradient endpoint.
    identity: apple-music-pink
    on-identity: apple-music-white

    background: apple-music-black
    surface: apple-music-surface
    surface-elevated: apple-music-surface-elevated
    text-primary: apple-music-white
    text-secondary: apple-music-gray-light
    text-tertiary: apple-music-gray

    primary: apple-music-pink
    primary-hover: apple-music-coral
    accent: apple-music-pink
    accent-hover: apple-music-red
    mark: apple-music-pink
    error: apple-music-red
  typography:
    display: heading
    prose: body
    wordmark: heading
    code: mono

assets: []

rules:
  - type: colorChoice
    target: logo.mark.fill
    allowed:
      - apple-music-pink
      - apple-music-red
      - apple-music-coral
      - apple-music-white
    forbidden:
      - apple-music-black
      - apple-music-gray
      - apple-music-gray-light
    severity: error
    rationale: >
      The Apple Music mark renders as the pink-to-red gradient
      or as a flat-white reversed variant on dark / chromatic
      surfaces. Filling the mark with the neutral grays or with
      black collapses the gradient identity into the parent
      Apple corporate monochrome posture, which is reserved for
      the Apple corporate mark at `apple@1`.

  - type: forbiddenTreatment
    target: logo
    treatments:
      - stretched
      - rotated
      - recolored
      - drop-shadow
      - on-busy-photo
      - outlined
      - gradient-reversed
    severity: error
    rationale: >
      Apple Music inherits the Apple Identity Guidelines'
      prohibition on stretching, rotating, recoloring, or adding
      effects to the mark. The gradient direction is fixed
      (pink at one terminus, red at the other) — reversing the
      gradient inverts the brand's published treatment.

  - type: contrastRatio
    target: text-primary
    against: background
    minRatio: 4.5
    standard: WCAG-AA
    severity: error
    rationale: >
      Apple Music White (#FFFFFF) on Apple Music Black (#000000)
      gives ~21:1 — well clear of WCAG 2.1 Level AA. This rule
      encodes the floor any new role pairing must clear on the
      dark canvas.

  - type: contrastRatio
    target: roles.colors.primary
    against: background
    minRatio: 3.0
    standard: WCAG-AA-large
    severity: error
    rationale: >
      Apple Music Pink (#FF4E6B) on the dark canvas must remain
      perceptible at interactive sizes. Falling below 3:1
      (AA-large) breaks the affordance of primary CTAs and the
      play button the brand depends on.

  - type: contextRestriction
    target: roles.colors.primary
    forbiddenContexts:
      - body-text
      - secondary-link
      - validation-failure
    severity: error
    rationale: >
      The pink gradient terminus is reserved for the mark, hero
      typographic moments, and the primary play / subscribe
      action. Reusing it for body text or validation-failure
      states conflicts with its established positive-action
      meaning and dilutes the gradient identity.

  - type: enumMembership
    target: typography.heading.fontWeight
    allowed: ["500", "600", "700"]
    severity: recommendation
    rationale: >
      Apple's HIG type ramp uses SF Pro Medium (500) and
      Semibold (600) for most heading sizes, with Bold (700)
      reserved for hero typography. Apple Music's marketing
      headlines lean into the heavier end of this ramp for
      editorial impact while staying within the HIG-approved
      weight set.

  - type: fontPairing
    target: typography.heading
    requires: body
    minSizeRatio: 1.3
    severity: recommendation
    rationale: >
      Apple Music inherits Apple's HIG convention of using one
      family (SF Pro, substituted here by Inter) for both
      heading and body, distinguished by a meaningful size
      differential. A 1.3× floor preserves hierarchy when one
      family does both jobs.

  - type: accessibilityRequirement
    target: "*"
    standard: WCAG-AA
    criterion: "1.4.3"
    severity: error
    rationale: >
      WCAG 2.1 Success Criterion 1.4.3 (Contrast Minimum) —
      Level AA. Apple Music inherits the Apple HIG Accessibility
      floor: 4.5:1 for body text, 3:1 for large text and
      interactive controls.

  - type: compositionConstraint
    target: roles.colors.primary
    pairsWith:
      - apple-music-black
      - apple-music-surface
      - apple-music-white
    doesNotPairWith:
      - apple-music-gray
      - apple-music-gray-light
    severity: recommendation
    rationale: >
      The pink-to-red gradient reads cleanest against the deep
      black canvas or against pure white. Pairing the gradient
      against the mid-grays produces a muddy adjacency that
      fights the gradient's saturation rather than supporting
      it as a focal accent.
