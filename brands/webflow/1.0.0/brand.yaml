id: webflow
version: 1.0.0
name: Webflow
description: >
  Webflow is a visual web-development platform — a designer canvas
  on top of a production website builder, with CMS, e-commerce,
  hosting, and (since 2023) a marketing platform layer. The brand
  voice is design-first, developer-aware, and professional.
  Visually, the identity is the wordmark in Webflow Blue
  (#4353FF) on a clean white canvas with near-black body text.
tags: [saas, no-code, webflow, design-tools, web-development]

provenance:
  source: https://webflow.com/press
  license: Proprietary — All Rights Reserved
  attribution: >
    Webflow and the Webflow logo are trademarks of Webflow, Inc.
    The primary brand color Webflow Blue (#4353FF) is documented
    on Webflow's press resources. brand-atoms catalogues only the
    publicly documented signature color and authored neutrals;
    licensed application of the Webflow name and mark is governed
    by Webflow's brand-use guidance at webflow.com/press.
  importedDate: 2026-05-18
  notes: >
    Webflow's marketing pages render in a neutral humanist sans
    consistent with Inter; Inter is referenced here as the primary
    face and is already in the brand-atoms catalog.

references:
  palette: webflow@1
  fonts:
    heading: inter@1
    body: inter@1
    mono: jetbrainsmono-nerdfont@1

roles:
  colors:
    # identity = the brand's signature surface. Webflow's identity
    # is the wordmark in Webflow Blue — the blue carries the
    # institutional voice on the clean white canvas.
    identity: webflow-blue
    on-identity: webflow-white

    primary: webflow-blue
    primary-hover: webflow-blue-hover
    accent: webflow-blue
    accent-hover: webflow-blue-hover

    success: webflow-blue
    warning: webflow-blue
    error: webflow-blue

    background-light: webflow-white
    background-dark: webflow-canvas-dark
    surface-light: webflow-surface-light
    surface-dark: webflow-surface-dark
    text-primary-light: webflow-black
    text-primary-dark: webflow-white
  typography:
    display: heading
    prose: body
    code: mono

assets: []

rules:
  - type: colorChoice
    target: logo.mark
    allowed:
      - webflow-blue
      - webflow-white
      - webflow-black
    forbidden:
      - any-non-brand-color
    severity: error
    rationale: >
      The Webflow wordmark renders in Webflow Blue on light
      surfaces and in white on dark surfaces. Recoloring the
      wordmark into off-brand hues violates Webflow's brand-use
      guidance.

  - type: forbiddenTreatment
    target: logo
    treatments:
      - stretched
      - rotated
      - recolored
      - drop-shadow
      - on-busy-photo
      - gradient-fill
    severity: error
    rationale: >
      Webflow's press resources prohibit stretching, rotating,
      recoloring, or applying decorative effects to the wordmark.

  - type: contrastRatio
    target: text-primary
    against: background
    minRatio: 4.5
    standard: WCAG-AA
    severity: error
    rationale: >
      WCAG 2.1 Level AA contrast minimum for body text. Webflow
      Black (#080F25) on Webflow White (#FFFFFF) clears AA at
      very high contrast.

  - type: variantSelection
    target: logo
    when:
      backgroundColorScheme: dark
    use: logo-light
    severity: error
    rationale: >
      On dark surfaces, use Webflow's documented light-fill
      wordmark variant; do not invert the blue wordmark on the
      fly.

  - type: contextRestriction
    target: roles.colors.identity
    forbiddenContexts:
      - product-of-competitor
      - merchandise
      - endorsement-implication
      - company-name-or-domain
    severity: error
    rationale: >
      Webflow's trademark guidance forbids use of the Webflow
      name and mark in third-party company names, domains, and
      uses that imply affiliation or endorsement.

  - type: compositionConstraint
    target: roles.colors.identity
    pairsWith:
      - webflow-white
      - webflow-black
      - webflow-surface-light
    severity: recommendation
    rationale: >
      Webflow Blue is calibrated to read on white and near-black.
      Pairing it with another saturated hue at the same weight
      breaks the focused, design-first voice of the brand
      surface.

  - type: enumMembership
    target: typography.heading.fontWeight
    allowed: ["500", "600", "700"]
    severity: warning
    rationale: >
      Webflow's marketing surfaces render headings in the 500–700
      band; lighter weights undermine the confident, design-first
      voice of the brand.

  - type: accessibilityRequirement
    target: "*"
    standard: WCAG-AA
    criterion: "1.4.3"
    severity: error
    rationale: >
      WCAG 2.1 Success Criterion 1.4.3 (Contrast Minimum) — Level
      AA. Webflow-skinned surfaces must clear AA on body text.
