id: the-verge
version: 1.0.0
name: The Verge
description: >
  The Verge is Vox Media's flagship tech-and-culture publication —
  a digital-native newsroom whose 2022 brand refresh established
  a distinctive electric-purple-and-neon-mint visual system.
  The identity reads as engineered for the screen: deep ink on
  bright white, a saturated electric purple (#5200FF) as primary
  action, and a fluorescent mint (#3CFFD0) for accent emphasis.
  The proprietary Manuka (display), Polysans (sans), FK Roman
  Standard (serif), and PolySansMono carry the editorial voice.

tags: [the-verge, verge, vox-media, tech, news, brand, electric, digital]

provenance:
  source: https://www.theverge.com/
  license: Proprietary — All Rights Reserved
  attribution: >
    Vox Media, LLC — visual identity captured from the deployed
    Next.js stylesheet at theverge.com/_next/static/css/. The
    Verge, Vox Media, and the Manuka / Polysans / FK Roman
    Standard typefaces are property of Vox Media, LLC.
  importedDate: 2026-05-19
  notes: >
    Derived from live site CSS at https://www.theverge.com/ on
    2026-05-19; no public brand guide located. The proprietary
    Manuka, Polysans, FK Roman Standard, and PolySansMono
    typefaces are declared on the live stylesheet but are not
    publicly distributed. Open-source substitutes — inter@1 for
    the sans role, playfair-display@1 for the serif display
    role, and jetbrainsmono-nerdfont@1 for mono — are referenced
    here. The Verge's 2022 brand refresh by design lead Will
    Joel and the Vox in-house team has been widely covered.

references:
  palette: the-verge@1
  fonts:
    heading: inter@1
    body: inter@1
    serif: playfair-display@1
    mono: jetbrainsmono-nerdfont@1

roles:
  colors:
    identity: ink
    on-identity: neon-mint

    primary: electric-purple
    primary-hover: electric-purple-pressed
    accent: neon-mint
    accent-hover: verge-green
    mark: ink
    success: verge-green
    warning: yellow-bright
    error: electric-purple-pressed
    text-primary-light: ink
    text-primary-dark: white
    background-light: white
    background-dark: ink
    surface-light: gray-surface
    surface-dark: gray-bright
    text-secondary-light: gray-medium
    text-tertiary-light: gray-muted
    border-light: gray-divider
  typography:
    display: heading
    prose: body
    serif: serif
    code: mono

assets: []

rules:
  - type: contrastRatio
    target: text-primary
    against: background
    minRatio: 7.0
    standard: WCAG-AAA
    severity: error
    rationale: >
      Ink (#131313) on white gives ~18:1 — well past AAA. The
      Verge's 2022 brand refresh emphasized accessibility as a
      first-class design constraint; the long-form review and
      explainer format justifies the AAA contrast target.

  - type: colorChoice
    target: roles.colors.primary
    allowed:
      - electric-purple
      - electric-purple-pressed
      - electric-purple-light
    forbidden:
      - neon-mint
      - verge-green
      - yellow-bright
    severity: error
    rationale: >
      Electric purple (#5200FF) is The Verge's primary action
      color in the 2022 refresh — CTAs, in-copy links, and
      interactive emphasis. Neon mint is an accent reserved for
      decorative emphasis and ornament; using it for the primary
      role would collapse the action/accent hierarchy the brand
      establishes.

  - type: contextRestriction
    target: roles.colors.accent
    allowedContexts:
      - ornament
      - editorial-emphasis
      - feature-callout
      - section-tag
    forbiddenContexts:
      - default-cta
      - error-state
      - destructive-action
    severity: error
    rationale: >
      Neon mint (#3CFFD0) is high-saturation and bright; it
      functions as ornament and feature-callout in Verge
      layouts, not as a CTA or destructive-action color.
      Substituting it for primary action would conflict with
      the saturation/role hierarchy the refresh established.

  - type: forbiddenTreatment
    target: logo
    treatments:
      - stretched
      - rotated
      - drop-shadow
      - on-busy-photo
      - gradient-fill
    severity: error
    rationale: >
      The Verge wordmark and ™ logo lockup are governed brand
      assets. Stretching, rotating, applying gradient fills, or
      placing the mark on a busy photograph conflicts with the
      brand's high-contrast, type-led identity system.

  - type: fontPairing
    target: typography.heading
    requires: body
    minSizeRatio: 1.5
    severity: error
    rationale: >
      Verge headlines pair the Manuka display face with Polysans
      body at a clear typographic step. A 1.5× minimum ratio
      preserves the hierarchy when open-source substitutes
      (Inter for body and display sans, Playfair Display where
      a serif is required) stand in for the proprietary
      primaries.

  - type: accessibilityRequirement
    target: "*"
    standard: WCAG-AAA
    criterion: "1.4.6"
    severity: warning
    rationale: >
      WCAG 2.1 Success Criterion 1.4.6 (Contrast Enhanced) —
      Level AAA. The 2022 refresh explicitly emphasized
      accessibility; the enhanced contrast target reinforces
      that commitment in this brand atom.

  - type: enumMembership
    target: typography.heading.fontWeight
    allowed: ["400", "500", "600", "700", "800", "900"]
    severity: warning
    rationale: >
      Polysans on theverge.com is published across Regular
      through Black. The full weight range is part of the
      typographic voice; synthetic weights outside this range
      would degrade the display face.

  - type: compositionConstraint
    target: roles.colors.accent
    pairsWith:
      - ink
      - white
      - electric-purple
    doesNotPairWith:
      - yellow-bright
      - rose-faint
    severity: recommendation
    rationale: >
      Neon mint reads cleanest against ink, white, or its
      complementary electric purple. Placing it adjacent to the
      bright yellow or rose faint introduces a chromatic
      collision that defeats the high-contrast hierarchy the
      Verge refresh depends on.
