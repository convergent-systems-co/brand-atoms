id: trello
version: 1.0.0
name: Trello
description: >
  Trello is a card-and-board work-management tool — the kanban app
  that made boards mainstream — owned by Atlassian since the 2017
  acquisition. The brand voice is friendly, playful, and direct.
  Visually, Trello carries its own signature blue mark (#0079BF)
  while sharing the Atlassian Design product surface language —
  clean white canvases, near-black body text, and a disciplined
  neutral system.
tags: [saas, productivity, trello, atlassian, kanban]

provenance:
  source: https://atlassian.design/
  license: Proprietary — All Rights Reserved
  attribution: >
    Trello and the Trello logo are trademarks of Atlassian Pty
    Ltd. The primary brand color Trello Blue (#0079BF) is
    documented in Trello's brand surfaces; the surrounding product
    design language is documented at Atlassian Design
    (atlassian.design). brand-atoms catalogues only the publicly
    documented signature color and authored neutrals; licensed
    application of the Trello name and mark is governed by
    Atlassian's brand-use guidance.
  importedDate: 2026-05-18
  notes: >
    Trello's product surfaces render in a neutral humanist sans
    consistent with Inter; Inter is referenced here as the primary
    face and is already in the brand-atoms catalog. Atlassian's
    Charlie Display proprietary face is used on some marketing
    surfaces; consumers with a licensed Charlie Display file
    should override this reference at consumption time.

references:
  palette: trello@1
  fonts:
    heading: inter@1
    body: inter@1
    mono: jetbrainsmono-nerdfont@1

roles:
  colors:
    # identity = the brand's signature surface. Trello's identity is
    # the kanban-card mark in Trello Blue — the blue carries the
    # institutional voice on the clean white canvas.
    identity: trello-blue
    on-identity: trello-white

    primary: trello-blue
    primary-hover: trello-blue-hover
    accent: trello-blue
    accent-hover: trello-blue-hover

    success: trello-blue
    warning: trello-blue
    error: trello-blue

    background-light: trello-white
    background-dark: trello-canvas-dark
    surface-light: trello-surface-light
    surface-dark: trello-surface-dark
    text-primary-light: trello-black
    text-primary-dark: trello-white
  typography:
    display: heading
    prose: body
    code: mono

assets: []

rules:
  - type: colorChoice
    target: logo.mark
    allowed:
      - trello-blue
      - trello-white
      - trello-black
    forbidden:
      - any-non-brand-color
    severity: error
    rationale: >
      The Trello mark renders in Trello Blue on light surfaces and
      in white on dark surfaces. Recoloring the mark into off-
      brand hues violates Atlassian's brand-use guidance for
      Trello.

  - type: forbiddenTreatment
    target: logo
    treatments:
      - stretched
      - rotated
      - recolored
      - drop-shadow
      - on-busy-photo
      - gradient-fill
    severity: error
    rationale: >
      Atlassian's brand resources prohibit stretching, rotating,
      recoloring, or applying decorative effects to portfolio
      marks, including Trello.

  - type: contrastRatio
    target: text-primary
    against: background
    minRatio: 4.5
    standard: WCAG-AA
    severity: error
    rationale: >
      WCAG 2.1 Level AA contrast minimum for body text. Trello
      Black (#172B4D) on Trello White (#FFFFFF) clears AA
      comfortably.

  - type: variantSelection
    target: logo
    when:
      backgroundColorScheme: dark
    use: logo-light
    severity: error
    rationale: >
      On dark surfaces, use Trello's documented light-fill mark
      variant; do not invert the blue mark on the fly.

  - type: contextRestriction
    target: roles.colors.identity
    forbiddenContexts:
      - product-of-competitor
      - merchandise
      - endorsement-implication
      - company-name-or-domain
    severity: error
    rationale: >
      Atlassian's trademark guidance forbids use of the Trello
      name and mark in third-party company names, domains, and
      uses that imply affiliation or endorsement.

  - type: compositionConstraint
    target: roles.colors.identity
    pairsWith:
      - trello-white
      - trello-black
      - trello-surface-light
    severity: recommendation
    rationale: >
      Trello Blue is calibrated to read on white and on Atlassian's
      documented near-black. Pairing it with another saturated hue
      at the same weight breaks the focused, board-anchored voice
      of the brand surface.

  - type: enumMembership
    target: typography.heading.fontWeight
    allowed: ["500", "600", "700"]
    severity: warning
    rationale: >
      Trello's marketing and product surfaces render headings in
      the 500–700 band, consistent with Atlassian Design; lighter
      weights undermine the confident voice of the brand.

  - type: accessibilityRequirement
    target: "*"
    standard: WCAG-AA
    criterion: "1.4.3"
    severity: error
    rationale: >
      WCAG 2.1 Success Criterion 1.4.3 (Contrast Minimum) — Level
      AA. Trello-skinned surfaces must clear AA on body text, in
      line with Atlassian Design's accessibility floor.
