kind: palette
id: sketch
version: 1.0.0
name: Sketch
description: >
  Sketch's brand palette, anchored on Sketch Yellow (#FDB300) —
  the signature warm yellow-orange that has carried the diamond
  mark since the platform's early days. The institutional voice
  pairs that yellow with a clean white canvas and near-black body
  text on marketing surfaces. Where competing design tools commit
  to blues and purples, Sketch holds to a distinctive warm yellow.
tags: [saas, design-tools, sketch, yellow]

provenance:
  source: https://www.sketch.com/press
  license: Proprietary — All Rights Reserved
  attribution: >
    Sketch and the Sketch logo are trademarks of Sketch B.V. The
    primary brand color Sketch Yellow (#FDB300) is documented on
    Sketch's press resources and is independently cross-referenced
    by the simple-icons brand database, which cites sketch.com as
    the source.
  importedDate: 2026-05-18
  notes: >
    Only Sketch Yellow (#FDB300) is read directly from Sketch's
    public brand surfaces. Secondary neutrals (mid-grays, dark
    canvas, hover yellow) are authored neutral inversions
    calibrated to support both modes consistently without
    fabricating hex values that Sketch does not publish.

swatches:
  # ─── Signature ─────────────────────────────────────────────────
  - id: sketch-yellow
    name: Sketch Yellow
    value: "#FDB300"
    description: >
      Signature warm yellow-orange. Primary brand color — used on
      the diamond mark, the wordmark accent, and key brand
      surfaces.

  # ─── Neutrals ──────────────────────────────────────────────────
  - id: sketch-white
    name: Sketch White
    value: "#FFFFFF"
    description: Canvas on light surfaces; reversed wordmark fill.
  - id: sketch-black
    name: Sketch Black
    value: "#000000"
    description: Wordmark on light backgrounds; near-black body text.
  - id: sketch-canvas-dark
    name: Sketch Canvas Dark
    value: "#1C1C1E"
    description: Authored dark-mode canvas — macOS-aligned neutral near-black.
  - id: sketch-surface-light
    name: Sketch Surface Light
    value: "#F5F5F7"
    description: Authored panel surface for light mode.
  - id: sketch-surface-dark
    name: Sketch Surface Dark
    value: "#2C2C2E"
    description: Authored elevated surface on dark mode.
  - id: sketch-text-secondary
    name: Sketch Text Secondary
    value: "#6E6E73"
    description: Authored secondary text — neutral mid-gray on light canvas.
  - id: sketch-text-tertiary
    name: Sketch Text Tertiary
    value: "#A1A1A6"
    description: Authored tertiary / muted text.
  - id: sketch-yellow-hover
    name: Sketch Yellow Hover
    value: "#FFC633"
    description: Authored softer Sketch Yellow for hover / active states.

modes:
  light:
    roles:
      background: sketch-white
      surface: sketch-surface-light
      surface-elevated: sketch-white
      text-primary: sketch-black
      text-secondary: sketch-text-secondary
      text-tertiary: sketch-text-tertiary
      primary: sketch-yellow
      primary-hover: sketch-yellow-hover
      accent: sketch-yellow
      accent-hover: sketch-yellow-hover
      warning: sketch-yellow
      warning-hover: sketch-yellow-hover
      error: sketch-yellow
      success: sketch-yellow

  dark:
    roles:
      background: sketch-canvas-dark
      surface: sketch-surface-dark
      surface-elevated: sketch-surface-dark
      text-primary: sketch-white
      text-secondary: sketch-text-tertiary
      text-tertiary: sketch-text-secondary
      primary: sketch-yellow
      primary-hover: sketch-yellow-hover
      accent: sketch-yellow
      accent-hover: sketch-yellow-hover
      warning: sketch-yellow
      warning-hover: sketch-yellow-hover
      error: sketch-yellow
      success: sketch-yellow
