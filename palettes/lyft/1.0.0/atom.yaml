kind: palette
id: lyft
version: 1.0.0
name: Lyft
description: >
  Lyft's brand palette is anchored on the signature Lyft Pink
  (#FF00BF) — a saturated, near-fluorescent magenta that has
  carried the brand since the 2019 rebrand and that ties back to
  the brand's earliest visual asset, the fuzzy pink "carstache."
  The pink reads against a near-white canvas with a deep ink for
  type, supported by a neutral ramp. The Lyft Pro typeface (the
  brand's custom corporate face) sets headlines and brand chrome.
tags: [lyft, mobility, ridesharing, brand, magenta, pink, light-first]

provenance:
  source: https://raw.githubusercontent.com/simple-icons/simple-icons/13.0.0/_data/simple-icons.json
  license: Proprietary — All Rights Reserved
  attribution: >
    Lyft, Inc. — Lyft, the Lyft wordmark, and Lyft Pink are
    property of Lyft, Inc. The signature pink hex (#FF00BF) is
    verified via the simple-icons brand database (v13.0.0). The
    public design-system reference is design.lyft.com.
  importedDate: 2026-05-19
  notes: >
    Only Lyft Pink (#FF00BF) is verified from a single authoritative
    source. The supporting neutral ramp (Lyft Ink through Lyft Mist)
    and functional success/warning hues are authored complements
    faithful to the Lyft design-system aesthetic on design.lyft.com
    rather than lifted verbatim from a single Lyft-published token
    table. The legacy magenta variant (#EA0B8C) is included as the
    pre-2019 brand pink for reference / continuity.

swatches:
