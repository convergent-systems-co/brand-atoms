kind: palette
id: atlassian
version: 1.0.0
name: Atlassian
description: >
  Atlassian's design-token palette, sourced from the
  `@atlaskit/tokens` package — the package that backs every product
  surface in the Atlassian portfolio (Jira, Confluence, Trello,
  Bitbucket, Compass, Loom, Statuspage). Ten chromatic families
  (Blue, Teal, Purple, Magenta, Red, Orange, Yellow, Green, Lime,
  Neutral) running 100 → 1000+ with a 250 / 850 odd-stop. Atlassian
  Blue 800 (#1558BC) anchors the primary interactive role on light
  surfaces; Blue 400 (#669DF1) takes that role on dark surfaces.
  The Neutral scale supplies the canvas, surface, and text tokens
  for both modes.

tags: [atlassian, atlaskit, design-system, role-based, dual-mode]

provenance:
  source: https://github.com/pioug/atlassian-frontend-mirror/blob/main/design-system/tokens/src/artifacts/palettes-raw/palette.tsx
  license: Apache-2.0
  attribution: >
    Atlassian design tokens, Copyright Atlassian Pty Ltd, published
    under Apache-2.0 in the `@atlaskit/tokens` package. Hex values
    mirrored from the codegen palette artifact in the public
    `atlassian-frontend` mirror. Atlassian, Jira, Confluence, Trello,
    and associated marks are property of Atlassian Pty Ltd.
  importedDate: 2026-05-19
  importedFromVersion: "atlassian-frontend palettes-raw@2026-05"
  notes: >
    Atlassian's palette uses a 100..1000 scale with a 250 odd-stop
    for accessibility-tuned mid-tones and an 850 odd-stop for
    contrast-paired darks. The catalogue captures the anchor stops
    (100 / 200 / 400 / 700 / 800 / 900) for every family — the
    stops Atlassian's semantic tokens map onto — plus the full
    Neutral scale that drives canvas, surface, and text.

