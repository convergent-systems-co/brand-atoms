kind: palette
id: reuters
version: 1.0.0
name: Reuters
description: >
  The Reuters palette, captured from the published reuters-graphics
  open-source design tokens. The Reuters identity is anchored by
  the signature orange ($tr-orange = #FA6400) — the brand's
  unmissable wire-service accent — paired with a deep navy blue
  ($tr-dark-blue = #005DA2) for trusted-source links and a tight
  warm-gray scale for body content. The system also publishes a
  full 6-step palette across orange, blue, navy, purple, red,
  yellow, lime, green, and brown for editorial graphics.

tags: [reuters, news, journalism, wire-service, brand, orange, sans, light-first]

provenance:
  source: https://github.com/reuters-graphics/graphics-svelte-components/blob/main/src/lib/SiteHeader/scss/_colors.scss
  license: ISC / MIT (reuters-graphics open-source repos); brand identity remains property of Thomson Reuters
  attribution: >
    Thomson Reuters — palette values captured from the published
    reuters-graphics open-source SCSS at github.com/
    reuters-graphics/graphics-svelte-components and the
    accompanying reuters_colors.json palette. Reuters, the
    Thomson Reuters mark, and the Knowledge / Reuters Sans
    typefaces are property of Thomson Reuters.
  importedDate: 2026-05-19
  notes: >
    Hex values captured from the reuters-graphics components
    package on 2026-05-19. The Reuters orange and dark blue
    appear as named variables in the published SCSS. The
    proprietary Knowledge typeface family and the Reuters Sans
    family are not publicly distributed — open-source substitute
    (Inter@1) is referenced from the brand atom. A full editorial
    palette JSON (reuters_colors.json) is also published in the
    trElex graphics repo.

swatches:
