kind: palette
id: wapo
version: 1.0.0
name: The Washington Post
description: >
  The Washington Post palette, captured from the open-source
  Washington Post Design System (WPDS) tokens. The brand is a
  near-black ink ("gray20") on white, with a deliberate blue
  primary CTA (the WPDS "blue100") and a deep newsroom red
  reserved for breaking-news and emphasis. WPDS exposes a full
  9-step gray scale and tonal ramps across blue, red, orange,
  green, gold, teal, purple, and pink.

tags: [washington-post, news, journalism, brand, blue, serif, light-first]

provenance:
  source: https://github.com/washingtonpost/tachyons-css/blob/main/src/wpds-colors-tokens.css
  license: Proprietary brand identity; design-token source code under repository license
  attribution: >
    The Washington Post — palette values captured from the
    published WPDS color tokens at github.com/washingtonpost/
    tachyons-css/src/wpds-colors-tokens.css. The Washington Post,
    its masthead, and Postoni / Franklin typefaces are property
    of WP Company LLC.
  importedDate: 2026-05-19
  notes: >
    Hex values converted from the rgba() tokens published in
    the WPDS source on 2026-05-19. The proprietary Postoni Wide
    (display serif) and Franklin (sans) families are referenced
    in the design system but are not publicly distributed —
    open-source substitutes (Playfair Display, PT Serif, Inter)
    are referenced from the brand atom.

