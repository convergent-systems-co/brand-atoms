kind: palette
id: loom
version: 1.0.0
name: Loom
description: >
  Loom's brand palette, anchored on Loom Purple (#625DF5) — the
  signature blue-violet that carries the record-spool mark. Loom
  (acquired by Atlassian in 2023) keeps its own identity color
  for the async-video product surface. The institutional voice
  pairs that purple with a clean white canvas and near-black body
  text on marketing surfaces.
tags: [saas, productivity, loom, async-video, atlassian, purple]

provenance:
  source: https://www.loom.com/press
  license: Proprietary — All Rights Reserved
  attribution: >
    Loom and the Loom logo are trademarks of Loom, Inc. (an
    Atlassian company). The primary brand color Loom Purple
    (#625DF5) is documented on Loom's press resources and is
    independently cross-referenced by the simple-icons brand
    database, which cites loom.com as the source.
  importedDate: 2026-05-18
  notes: >
    Only Loom Purple (#625DF5) is read directly from Loom's
    public brand surfaces. Secondary neutrals (mid-grays, dark
    canvas, hover purple) are authored neutral inversions
    calibrated to support both modes consistently without
    fabricating hex values that Loom does not publish.

swatches:
  # ─── Signature ─────────────────────────────────────────────────
  - id: loom-purple
    name: Loom Purple
    value: "#625DF5"
    description: >
      Signature blue-violet. Primary brand color — used on the
      wordmark, the record-spool mark, primary CTAs, and key
      interactive surfaces.

  # ─── Neutrals ──────────────────────────────────────────────────
  - id: loom-white
    name: Loom White
    value: "#FFFFFF"
    description: Canvas on light surfaces; reversed wordmark fill.
  - id: loom-black
    name: Loom Black
    value: "#1A1A2E"
    description: Near-black body text on light backgrounds — Loom's marketing-page text tone.
  - id: loom-canvas-dark
    name: Loom Canvas Dark
    value: "#15152B"
    description: Authored dark-mode canvas — deep neutral with a faint purple cast aligned with the brand.
  - id: loom-surface-light
    name: Loom Surface Light
    value: "#F6F5FB"
    description: Authored panel surface for light mode.
  - id: loom-surface-dark
    name: Loom Surface Dark
    value: "#252442"
    description: Authored elevated surface on dark mode.
  - id: loom-text-secondary
    name: Loom Text Secondary
    value: "#6B6B7D"
    description: Authored secondary text — neutral mid-gray on light canvas.
  - id: loom-text-tertiary
    name: Loom Text Tertiary
    value: "#9999A9"
    description: Authored tertiary / muted text.
  - id: loom-purple-hover
    name: Loom Purple Hover
    value: "#7E7AF7"
    description: Authored softer Loom Purple for hover / active states.

modes:
  light:
    roles:
      background: loom-white
      surface: loom-surface-light
      surface-elevated: loom-white
      text-primary: loom-black
      text-secondary: loom-text-secondary
      text-tertiary: loom-text-tertiary
      primary: loom-purple
      primary-hover: loom-purple-hover
      accent: loom-purple
      accent-hover: loom-purple-hover
      warning: loom-purple
      warning-hover: loom-purple-hover
      error: loom-purple
      success: loom-purple

  dark:
    roles:
      background: loom-canvas-dark
      surface: loom-surface-dark
      surface-elevated: loom-surface-dark
      text-primary: loom-white
      text-secondary: loom-text-tertiary
      text-tertiary: loom-text-secondary
      primary: loom-purple
      primary-hover: loom-purple-hover
      accent: loom-purple
      accent-hover: loom-purple-hover
      warning: loom-purple
      warning-hover: loom-purple-hover
      error: loom-purple
      success: loom-purple
