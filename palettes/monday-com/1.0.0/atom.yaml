kind: palette
id: monday-com
version: 1.0.0
name: monday.com
description: >
  monday.com's brand palette, anchored on Monday Red (#FF3D57) — the
  signature hot-coral red that has carried the brand since its
  identity refresh. The institutional voice pairs that red with a
  clean white canvas and near-black body text. Where competing
  work-OS brands lean on blues and purples, monday.com commits to
  a single, energetic red as its identity anchor.
tags: [saas, productivity, monday-com, work-os, red]

provenance:
  source: https://monday.com/p/press
  license: Proprietary — All Rights Reserved
  attribution: >
    monday.com and the monday.com logo are trademarks of
    monday.com Ltd. The primary brand color Monday Red (#FF3D57) is
    documented on monday.com's press resources and is independently
    cross-referenced by the simple-icons brand database, which
    cites monday.com as the source.
  importedDate: 2026-05-18
  notes: >
    Only Monday Red (#FF3D57) is read directly from monday.com's
    public brand surfaces. Secondary neutrals (mid-grays, dark
    canvas, hover red) are authored neutral inversions calibrated
    to support both modes consistently without fabricating hex
    values that monday.com does not publish.

