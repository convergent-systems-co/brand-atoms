kind: palette
id: salesforce
version: 1.0.0
name: Salesforce
description: >
  Salesforce's design-token palette, sourced from the public
  Salesforce Lightning Design System (SLDS) repository
  (`salesforce-ux/design-system`). Twelve chromatic families
  (Blue, Cloud Blue, Green, Hot Orange, Indigo, Orange, Pink,
  Purple, Red, Teal, Violet, Yellow) plus warm-gray and cool-gray
  neutrals. Each family runs 10 → 95 in non-uniform stops; the
  10/15/20-band is the darkest, the 90/95-band is the lightest.
  The documented Salesforce brand-primary color resolves to
  Palette Blue 50 (#0176D3) — the canonical SLDS interactive blue
  that ships in the Aloha and Lightning themes. Warm Gray is
  Salesforce's default neutral scale; Cool Gray is the alternate.

tags: [salesforce, slds, lightning, design-system, role-based, dual-mode]

provenance:
  source: https://github.com/salesforce-ux/design-system/blob/main/design-tokens/aliases/color-palettes.yml
  license: BSD-3-Clause
  attribution: >
    Salesforce Lightning Design System color tokens, Copyright
    salesforce.com inc., licensed under BSD-3-Clause. Hex values
    mirrored from `design-tokens/aliases/color-palettes.yml` on
    the `main` branch. Salesforce, Lightning Design System, SLDS,
    and associated marks are property of salesforce.com inc.
  importedDate: 2026-05-19
  importedFromVersion: "salesforce-ux/design-system main@2026-05"
  notes: >
    SLDS's `BRAND_PRIMARY` token resolves to PALETTE_BLUE_50
    (#0176D3); `BRAND_PRIMARY_ACTIVE` resolves to PALETTE_BLUE_50
    again under the renamed alias (the older guidance had it at
    blue-30); `BRAND_LIGHT` is `#F4F6FE`. The catalogue captures
    the anchor stops (20 / 50 / 60 / 90 / 95) across each
    chromatic family and the full Warm Gray scale that drives
    canvas, surface, and text.

