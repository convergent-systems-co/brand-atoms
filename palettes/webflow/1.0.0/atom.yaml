kind: palette
id: webflow
version: 1.0.0
name: Webflow
description: >
  Webflow's brand palette, anchored on Webflow Blue (#4353FF) —
  the signature indigo-blue that carries the wordmark and the
  "WF" mark. The institutional voice pairs that blue with a clean
  white canvas and near-black body text on marketing surfaces.
  Where competing no-code builders lean on multi-color identities,
  Webflow commits to a single confident indigo with disciplined
  neutrals.
tags: [saas, no-code, webflow, design-tools, blue]

provenance:
  source: https://webflow.com/press
  license: Proprietary — All Rights Reserved
  attribution: >
    Webflow and the Webflow logo are trademarks of Webflow, Inc.
    The primary brand color Webflow Blue (#4353FF) is documented
    on Webflow's press resources and is independently
    cross-referenced by the simple-icons brand database, which
    cites webflow.com as the source.
  importedDate: 2026-05-18
  notes: >
    Only Webflow Blue (#4353FF) is read directly from Webflow's
    public brand surfaces. Secondary neutrals (mid-grays, dark
    canvas, hover blue) are authored neutral inversions
    calibrated to support both modes consistently without
    fabricating hex values that Webflow does not publish.

swatches:
  # ─── Signature ─────────────────────────────────────────────────
  - id: webflow-blue
    name: Webflow Blue
    value: "#4353FF"
    description: >
      Signature indigo-blue. Primary brand color — used on the
      wordmark, the "WF" mark, primary CTAs, and key interactive
      surfaces.

  # ─── Neutrals ──────────────────────────────────────────────────
  - id: webflow-white
    name: Webflow White
    value: "#FFFFFF"
    description: Canvas on light surfaces; reversed wordmark fill.
  - id: webflow-black
    name: Webflow Black
    value: "#080F25"
    description: Near-black body text on light backgrounds — Webflow's marketing-page text tone.
  - id: webflow-canvas-dark
    name: Webflow Canvas Dark
    value: "#0E1330"
    description: Authored dark-mode canvas — deep neutral with a slight indigo cast aligned with the brand.
  - id: webflow-surface-light
    name: Webflow Surface Light
    value: "#F5F6FB"
    description: Authored panel surface for light mode.
  - id: webflow-surface-dark
    name: Webflow Surface Dark
    value: "#1B2046"
    description: Authored elevated surface on dark mode.
  - id: webflow-text-secondary
    name: Webflow Text Secondary
    value: "#3F4156"
    description: Authored secondary text — neutral mid-gray on light canvas.
  - id: webflow-text-tertiary
    name: Webflow Text Tertiary
    value: "#7A7D94"
    description: Authored tertiary / muted text.
  - id: webflow-blue-hover
    name: Webflow Blue Hover
    value: "#6371FF"
    description: Authored softer Webflow Blue for hover / active states.

modes:
  light:
    roles:
      background: webflow-white
      surface: webflow-surface-light
      surface-elevated: webflow-white
      text-primary: webflow-black
      text-secondary: webflow-text-secondary
      text-tertiary: webflow-text-tertiary
      primary: webflow-blue
      primary-hover: webflow-blue-hover
      accent: webflow-blue
      accent-hover: webflow-blue-hover
      warning: webflow-blue
      warning-hover: webflow-blue-hover
      error: webflow-blue
      success: webflow-blue

  dark:
    roles:
      background: webflow-canvas-dark
      surface: webflow-surface-dark
      surface-elevated: webflow-surface-dark
      text-primary: webflow-white
      text-secondary: webflow-text-tertiary
      text-tertiary: webflow-text-secondary
      primary: webflow-blue
      primary-hover: webflow-blue-hover
      accent: webflow-blue
      accent-hover: webflow-blue-hover
      warning: webflow-blue
      warning-hover: webflow-blue-hover
      error: webflow-blue
      success: webflow-blue
