kind: palette
id: mistral
version: 1.0.0
name: Mistral AI
description: >
  Mistral AI's brand palette as captured from the live marketing
  site (mistral.ai). The brand is dark-first: a near-black "Matt"
  canvas with a warm cream "Beige" inverse, fronted by Mistral's
  signature "Sunshine" ramp — a six-stop orange-to-coral arc that
  travels from sunshine yellow (#FFD900) through marigold and
  pumpkin to deep ember-red (#E10500). The brand's footer band
  renders the full Sunshine ramp as a horizontal stripe, which is
  the visual signature of the identity.

  Mistral is dark-first; the light mode used on documentation and
  reading surfaces flips Matt-black to a warm Beige canvas with
  near-black text.

tags: [mistral, ai, brand, dark-first, orange, sunshine, gradient]

provenance:
  source: https://mistral.ai/
  license: Proprietary — All Rights Reserved
  attribution: >
    Mistral AI — palette values captured from the deployed
    stylesheet on mistral.ai (--color-mistral-sunshine-*,
    --mistral-beige-*, --mistral-black-matt-*, --mistral-footer-band-*
    CSS custom-property families). Mistral, Mistral AI, and
    associated marks are property of Mistral AI.
  importedDate: 2026-05-18
  notes: >
    Derived from live site CSS at https://mistral.ai/ on 2026-05-18;
    no public brand guide located. Sunshine ramp 50→950 mirrors
    Mistral's own internal naming (--color-mistral-sunshine-50
    through --color-mistral-sunshine-950). The "footer band" tokens
    are the six discrete stops Mistral renders as a horizontal
    rainbow stripe across the site footer. The proprietary display
    face Pixelbasel and the proprietary mono FragmentMono are
    declared on mistral.ai via @font-face but are not publicly
    distributed; brand atom substitutes inter@1 and geist-mono@1.

