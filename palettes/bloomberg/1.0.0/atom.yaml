kind: palette
id: bloomberg
version: 1.0.0
name: Bloomberg
description: >
  The Bloomberg palette as deployed on bloomberg.com, captured
  from the published Phoenix ("phx") design-system tokens served
  alongside the consumer site. The identity is built on a precise,
  data-terminal feel: near-black on white, deep ink dark mode,
  and a signature Bloomberg yellow (#FFCD1E) reserved for the
  ticker accent and editorial emphasis. The system publishes a
  full 9-step ramp across gray, red, green, yellow, opinion blue,
  and subscription violet — designed for chart legibility on the
  terminal as much as the editorial page.

tags: [bloomberg, news, finance, journalism, brand, yellow, terminal, light-first]

provenance:
  source: https://www.bloomberg.com/
  license: Proprietary — All Rights Reserved
  attribution: >
    Bloomberg L.P. — palette values captured from the deployed
    Phoenix design-system CSS tokens at assets.bwbx.io (the
    Next.js asset CDN that serves bloomberg.com). Bloomberg, the
    Bloomberg Terminal, and the Mecano / Avenir Next / Publico
    typefaces are property of Bloomberg L.P.
  importedDate: 2026-05-19
  notes: >
    Derived from live --phx-color-* CSS custom-property tokens
    extracted from bloomberg.com Next.js stylesheets on
    2026-05-19; no public brand guide located. The proprietary
    Bloomberg Mecano (display) typeface, Avenir Next variant
    (sans), and Publico Head / Publico Text (serif) are
    referenced in the live CSS but are not publicly distributed.
    Open-source substitutes — source-serif-4@1 for the serif
    role and inter@1 for sans — are referenced from the brand
    atom.

