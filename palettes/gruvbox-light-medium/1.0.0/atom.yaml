kind: palette
id: gruvbox-light-medium
version: 1.0.0
name: Gruvbox Light (Medium Contrast)
description: >
  Pavel Pertsev's Gruvbox — retro-groove light variant at medium contrast.
  Warm cream background (#FBF1C7) with dark warm-grey text. Uses "faded"
  accents tuned for light surfaces.
tags: [dev-theme, light, classic, gruvbox, retro]

provenance:
  source: https://github.com/morhetz/gruvbox/blob/master/colors/gruvbox.vim
  license: MIT
  attribution: Gruvbox by Pavel Pertsev (morhetz/gruvbox)
  importedDate: 2026-05-17

swatches:
  # ─── Background tones (warm creams) ───
  - id: bg0
    name: bg0 (primary background, medium)
    value: "#FBF1C7"
  - id: bg1
    name: bg1
    value: "#EBDBB2"
  - id: bg2
    name: bg2
    value: "#D5C4A1"
  - id: bg3
    name: bg3
    value: "#BDAE93"
  - id: bg4
    name: bg4
    value: "#A89984"

  # ─── Foreground tones (dark warm grey) ───
  - id: fg0
    name: fg0 (darkest)
    value: "#282828"
  - id: fg1
    name: fg1 (primary text)
    value: "#3C3836"
  - id: fg2
    name: fg2
    value: "#504945"
  - id: fg3
    name: fg3
    value: "#665C54"
  - id: fg4
    name: fg4 (muted)
    value: "#7C6F64"
  - id: gray
    name: Gray (comment)
    value: "#928374"

  # ─── Neutral accents ───
  - id: red
    name: Red
    value: "#CC241D"
  - id: green
    name: Green
    value: "#98971A"
  - id: yellow
    name: Yellow
    value: "#D79921"
  - id: blue
    name: Blue
    value: "#458588"
  - id: purple
    name: Purple
    value: "#B16286"
  - id: aqua
    name: Aqua
    value: "#689D6A"
  - id: orange
    name: Orange
    value: "#D65D0E"

  # ─── Faded accents (light-mode boosted) ───
  - id: faded-red
    name: Faded red
    value: "#9D0006"
  - id: faded-green
    name: Faded green
    value: "#79740E"
  - id: faded-yellow
    name: Faded yellow
    value: "#B57614"
  - id: faded-blue
    name: Faded blue
    value: "#076678"
  - id: faded-purple
    name: Faded purple
    value: "#8F3F71"
  - id: faded-aqua
    name: Faded aqua
    value: "#427B58"
  - id: faded-orange
    name: Faded orange
    value: "#AF3A03"

modes:
  light:
    roles:
      background: bg0
      surface: bg1
      surface-elevated: bg2
      text-primary: fg1
      text-secondary: fg2
      text-tertiary: gray
      primary: faded-blue
      primary-hover: faded-aqua
      accent: faded-orange
      secondary-accent: faded-purple
      success: faded-green
      warning: faded-yellow
      error: faded-red
      info: faded-blue
      annotation: faded-orange
      special: faded-purple
  dark:
    # Inversion using neutral accents.
    roles:
      background: fg0
      surface: fg1
      surface-elevated: fg2
      text-primary: bg0
      text-secondary: bg1
      text-tertiary: gray
      primary: blue
      primary-hover: aqua
      accent: orange
      secondary-accent: purple
      success: green
      warning: yellow
      error: red
      info: blue
      annotation: orange
      special: purple
