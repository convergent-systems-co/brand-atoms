kind: palette
id: the-atlantic
version: 1.0.0
name: The Atlantic
description: >
  The Atlantic palette as deployed on theatlantic.com. The 165-year
  publication's identity is anchored by the signature Atlantic red
  (#E7131A) — the masthead and ™ accent — paired with a deep
  graphite ink on a warm cream canvas (#FAF4EB). Secondary
  desaturated grays and a calm teal-cyan handle data viz and
  interactive emphasis. The proprietary Lyon (display serif),
  Atlantic Condensed, Druk (display), Goldwyn, and Graphik (sans)
  typefaces carry the long-form essay voice.

tags: [the-atlantic, atlantic, magazine, journalism, brand, red, cream, serif, light-first]

provenance:
  source: https://www.theatlantic.com/
  license: Proprietary — All Rights Reserved
  attribution: >
    The Atlantic Monthly Group LLC — palette values captured from
    the deployed Next.js stylesheet at cdn.theatlantic.com/
    _next/static/css/. The Atlantic, the Lyon / Atlantic
    Condensed / Druk / Goldwyn / Graphik / Adobe Garamond Pro
    typefaces are property of The Atlantic.
  importedDate: 2026-05-19
  notes: >
    Derived from live site CSS at https://www.theatlantic.com/
    on 2026-05-19; no public brand guide located. The
    proprietary Lyon (the magazine's display serif), Atlantic
    Condensed, Druk, Goldwyn, and Graphik typefaces are declared
    on the live stylesheet but are not publicly distributed.
    Open-source substitutes — lora@1 for the serif body role,
    playfair-display@1 for the display serif role, inter@1 for
    sans — are referenced from the brand atom. Adobe Garamond
    Pro is used in archival/legacy contexts on the site.

swatches:
  - id: signature-red
    name: Atlantic Red
    value: "#E7131A"
    description: The signature Atlantic red — masthead and ™ accent.
  - id: red-bright
    name: Red Bright
    value: "#F0204F"
    description: Brighter red for live-update and emphasis.
  - id: red-deep
    name: Red Deep
    value: "#D0021B"
    description: Deeper red — pressed states and editorial emphasis.

  - id: cream
    name: Cream
    value: "#FAF4EB"
    description: Warm cream canvas — the Atlantic paper tone.
  - id: white
