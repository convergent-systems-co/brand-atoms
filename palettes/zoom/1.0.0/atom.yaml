kind: palette
id: zoom
version: 1.0.0
name: Zoom
description: >
  Zoom's brand palette, anchored on Zoom Blue (#2D8CFF) — the signature
  bright communications blue used across the meeting client and
  marketing surfaces. The institutional voice pairs that blue with a
  clean white canvas and near-black body text; the dark-mode product
  surface is a deep neutral that lets the blue sit forward without
  competing.
tags: [saas, productivity, zoom, communications, blue]

provenance:
  source: https://brand.zoom.us/
  license: Proprietary — All Rights Reserved
  attribution: >
    Zoom and the Zoom logo are trademarks of Zoom Video Communications,
    Inc. The primary brand color Zoom Blue (#2D8CFF) is documented on
    Zoom's brand portal at brand.zoom.us and is independently
    cross-referenced by the simple-icons brand database, which cites
    zoom.us as the source.
  importedDate: 2026-05-18
  notes: >
    Only Zoom Blue (#2D8CFF) and the canonical white/black surface
    tones are read directly from Zoom's brand surfaces. Secondary
    neutrals (mid-grays, dark-mode canvas) are authored neutral
    inversions calibrated to support both modes consistently without
    fabricating hex values that Zoom does not publish.

swatches:
  # ─── Signature ─────────────────────────────────────────────────
  - id: zoom-blue
    name: Zoom Blue
    value: "#2D8CFF"
    description: >
      Signature communications blue. Primary brand color — used on the
      wordmark, primary CTAs, and key interactive surfaces.

  # ─── Neutrals ──────────────────────────────────────────────────
  - id: zoom-white
    name: Zoom White
    value: "#FFFFFF"
    description: Canvas on light surfaces; reversed wordmark fill on dark surfaces.
  - id: zoom-black
    name: Zoom Black
    value: "#000000"
    description: Wordmark on light backgrounds; near-black body text.
  - id: zoom-canvas-dark
    name: Zoom Canvas Dark
    value: "#1A1A1A"
    description: Authored dark-mode canvas — neutral near-black.
  - id: zoom-surface-light
    name: Zoom Surface Light
    value: "#F5F5F5"
    description: Authored panel surface for light mode.
  - id: zoom-surface-dark
    name: Zoom Surface Dark
    value: "#2C2C2C"
    description: Authored elevated surface on dark mode.
  - id: zoom-text-secondary
    name: Zoom Text Secondary
    value: "#747487"
    description: Authored secondary text — neutral mid-gray on light canvas.
  - id: zoom-text-tertiary
    name: Zoom Text Tertiary
    value: "#A0A0AB"
    description: Authored tertiary / muted text.
  - id: zoom-blue-hover
    name: Zoom Blue Hover
    value: "#5AA4FF"
    description: Authored softer Zoom Blue for hover / active states.

modes:
  light:
    roles:
      background: zoom-white
      surface: zoom-surface-light
      surface-elevated: zoom-white
      text-primary: zoom-black
      text-secondary: zoom-text-secondary
      text-tertiary: zoom-text-tertiary
      primary: zoom-blue
      primary-hover: zoom-blue-hover
      accent: zoom-blue
      accent-hover: zoom-blue-hover
      warning: zoom-blue
      warning-hover: zoom-blue-hover
      error: zoom-blue
      success: zoom-blue

  dark:
    roles:
      background: zoom-canvas-dark
      surface: zoom-surface-dark
      surface-elevated: zoom-surface-dark
      text-primary: zoom-white
      text-secondary: zoom-text-tertiary
      text-tertiary: zoom-text-secondary
      primary: zoom-blue
      primary-hover: zoom-blue-hover
      accent: zoom-blue
      accent-hover: zoom-blue-hover
      warning: zoom-blue
      warning-hover: zoom-blue-hover
      error: zoom-blue
      success: zoom-blue
